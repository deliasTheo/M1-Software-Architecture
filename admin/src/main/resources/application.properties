spring.application.name=admin-service
server.servlet.context-path=/admin_service

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/authdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:authuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:authpass}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.sql.init.mode=${SPRING_SQL_INIT_MODE:never}

# Auth service URL for role verification
app.auth-service.url=${AUTH_SERVICE_URL:http://auth:8080}

# RabbitMQ connectivity
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Event topology for user registration publication
app.mq.exchange=${APP_MQ_EXCHANGE:auth.events}
app.mq.user-registered-routing-key=${APP_MQ_RK_USER_REGISTERED:auth.user-registered}
