upstream service_a { server 10.0.0.10:8080; }
upstream service_b { server 10.0.0.20:8080; }
upstream auth_service { server 10.0.0.30:8080; }

server {
    listen 80;

    # Subrequest d'authentification
    location = /_auth {
        internal;

        proxy_pass http://auth_service/validate;

        # subrequest sans body
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        # token du client
        proxy_set_header Authorization $http_authorization;

        # le service cible sera défini dans /a/ et /b/
        proxy_set_header X-Target-Service $target_service;
    }

    # Réponse 403 uniforme
    location = /_forbidden {
        internal;
        return 403;
    }

    # ---------- Service A ----------
    location /a/ {
        if ($http_authorization = "") { return 403; }

        set $target_service "A";
        auth_request /_auth;

        error_page 401 =403 /_forbidden;
        error_page 403 =     /_forbidden;

        proxy_pass http://service_a;
    }

    # ---------- Service B ----------
    location /b/ {
        if ($http_authorization = "") { return 403; }

        set $target_service "B";
        auth_request /_auth;

        error_page 401 =403 /_forbidden;
        error_page 403 =     /_forbidden;

        proxy_pass http://service_b;
    }

    # ---------- Route(s) publique(s) directe(s) vers O ----------
    # Exemple : POST /validate_email -> proxy direct vers O (pas d'auth NGINX)
    location = /validate_email {
        proxy_pass http://auth_service/validate_email;
    }
}