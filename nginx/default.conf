upstream service_a { server serv_a:8080; }
upstream service_b { server serv_b:8080; }
upstream auth_service { server auth:8080; }
upstream admin_service { server admin:8080; }

# Format de logging 
log_format auth_log '$remote_addr [$time_local] $request $status $body_bytes_sent [AUTH: $http_authorization]';
log_format error_log '$remote_addr [$time_local] $request ERROR $status';

server {
    listen 80;

    # Subrequest d'authentification vers le service auth
    location = /_auth {
        internal;

        proxy_pass http://auth_service/auth_service/authorization/validate;
        proxy_method POST;

        # Subrequest sans body
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";

        # Relaye le token du client
        proxy_set_header Authorization $http_authorization;

        # Le service cible est défini dans /a/ et /b/
        proxy_set_header X-Target-Service $target_service;

        # Utilise le hostname de destination (pas $host)
        proxy_set_header Host auth;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Réponse 403 uniforme
    location = /_forbidden {
        internal;
        return 403;
    }

    # Erreur 500
    location = /_error_500 {
        internal;
        access_log /var/log/nginx/errors.log error_log;
        return 500 "Internal Server Error";
    }

    # Erreur 502
    location = /_error_502 {
        internal;
        access_log /var/log/nginx/errors.log error_log;
        return 502 "Bad Gateway";
    }

    # Erreur 503
    location = /_error_503 {
        internal;
        access_log /var/log/nginx/errors.log error_log;
        return 503 "Service Unavailable";
    }

    # ---------- Service A ----------
    location /a/ {
        if ($http_authorization = "") { return 403; }

        set $target_service "A";
        auth_request /_auth;

        error_page 401 =403 /_forbidden;
        error_page 403 =     /_forbidden;
        error_page 500 =     /_error_500;
        error_page 502 =     /_error_502;
        error_page 503 =     /_error_503;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://service_a/;
    }

    # ---------- Service B ----------
    location /b/ {
        if ($http_authorization = "") { return 403; }

        set $target_service "B";
        auth_request /_auth;

        error_page 401 =403 /_forbidden;
        error_page 403 =     /_forbidden;
        error_page 500 =     /_error_500;
        error_page 502 =     /_error_502;
        error_page 503 =     /_error_503;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://service_b/;
    }

    # ---------- Route publique vers le service auth ----------
    location /validate_email {
        proxy_pass http://auth_service/auth_service/identity/validate_email$is_args$args;
        proxy_set_header Host auth;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Register - Route publique ----------
    location = /register {
        access_log /var/log/nginx/auth.log auth_log;
        
        error_page 500 =     /_error_500;
        error_page 502 =     /_error_502;
        error_page 503 =     /_error_503;
        
        proxy_pass http://auth_service/auth_service/identity/register;
        proxy_set_header Host auth;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Login - Route publique ----------
    location = /login {
        access_log /var/log/nginx/auth.log auth_log;
        
        error_page 500 =     /_error_500;
        error_page 502 =     /_error_502;
        error_page 503 =     /_error_503;
        
        proxy_pass http://auth_service/auth_service/identity/login;
        proxy_set_header Host auth;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /logout {
        access_log /var/log/nginx/auth.log auth_log;
        
        error_page 500 =     /_error_500;
        error_page 502 =     /_error_502;
        error_page 503 =     /_error_503;
        
        proxy_pass http://auth_service/auth_service/identity/logout;
        proxy_set_header Host auth;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---------- Admin Service ----------
    location /admin/ {
        if ($http_authorization = "") { return 403; }

        access_log /var/log/nginx/auth.log auth_log;
        
        error_page 500 =     /_error_500;
        error_page 502 =     /_error_502;
        error_page 503 =     /_error_503;

        proxy_set_header Host admin;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://admin_service/admin_service/admin/;
    }
}