spring.application.name=M1-Software-Architecture

# RabbitMQ connectivity (can be overridden by environment variables)
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

# Event topology for user registration publication
app.mq.exchange=${APP_MQ_EXCHANGE:auth.events}
app.mq.user-registered-routing-key=${APP_MQ_RK_USER_REGISTERED:auth.user-registered}
